server:
  port: 2333
  address: 0.0.0.0
  http2:
    enabled: false
plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    oauth:
      enabled: true
      refreshToken: ""
      skipInitialization: false
    remoteCipher:
      url: "http://yt-cipher:8001"
    clients:
      - MUSIC
      - WEB
      - MWEB
      - WEBEMBEDDED
      - ANDROID_MUSIC
      - ANDROID_VR
      - TV
      - TVHTML5_SIMPLY
      - TVHTML5_AUDIO
      - TVHTML5_KIDS
      - IOS
  lavasrc:
    providers:
      - "ytsearch:\"%ISRC%\"" 
      - "ytsearch:%QUERY%"
    sources:
      youtube: true
      spotify: true
      applemusic: false
      deezer: false
      yandexmusic: false
      flowerytts: false
    spotify:
      clientId: ""
      clientSecret: ""
      countryCode: ""
      playlistLoadLimit: 6
      albumLoadLimit: 6
      localFiles: false
lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.0"
      snapshot: false
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.1"
      snapshot: false
  server:
    password: "youshallnotpass"
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

sentry:
  dsn: ""
  environment: ""

logging:
  file:
    path: ./logs/

  level:
    root: INFO
    lavalink: INFO
    lavalink.server.io.SocketContext: TRACE
    com.sedmelluq.discord.lavaplayer.tools.ExceptionTools: INFO

  request:
    enabled: true
    includeClientInfo: true
    includeHeaders: false
    includeQueryString: true
    includePayload: true
    maxPayloadLength: 10000


  logback:
    rollingpolicy:
      max-file-size: 1GB
      max-history: 30
