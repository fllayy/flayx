services:
  # Service de dechiffrement des signatures YouTube
  yt-cipher:
    image: ghcr.io/kikkia/yt-cipher:master
    container_name: ejs_signature_api
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - lavalink_net

  # Serveur Lavalink
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:latest
    container_name: lavalink_server
    restart: unless-stopped
    volumes:
      - ./application.yml:/opt/Lavalink/application.yml
    environment:
      - _JAVA_OPTIONS=-Xmx1G
    depends_on:
      yt-cipher:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/2333'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - lavalink_net

  # FLAYX
  bot:
    image: ghcr.io/fllayy/flayx:latest
    container_name: flayx_bot
    restart: unless-stopped
    depends_on:
      lavalink:
        condition: service_healthy
    env_file:
      - flayx.env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - lavalink_net

networks:
  lavalink_net:
    driver: bridge
