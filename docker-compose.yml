services:
  # YT Cipher
  yt-cipher:
    image: ghcr.io/kikkia/yt-cipher:master
    container_name: ejs_signature_api
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - lavalink_net

  # Lavalink
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:latest
    container_name: lavalink_server
    restart: unless-stopped
    volumes:
      - ./application.yml:/opt/Lavalink/application.yml
    environment:
      - _JAVA_OPTIONS=-Xmx1G
    depends_on:
      yt-cipher:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/2333'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - lavalink_net

  # PostgreSQL DB
  postgres:
    image: postgres:16-alpine
    container_name: flayx_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: flayx
      POSTGRES_USER: flayx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flayx_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flayx -d flayx"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - lavalink_net

  # FLAYX
  bot:
    image: ghcr.io/fllayy/flayx:latest
    container_name: flayx_bot
    restart: unless-stopped
    depends_on:
      lavalink:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - flayx.env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - lavalink_net

  # Watchtower - auto-update des images
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
    networks:
      - lavalink_net

networks:
  lavalink_net:
    driver: bridge

volumes:
  postgres_data:
